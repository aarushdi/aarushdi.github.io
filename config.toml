baseURL = "aarushdi.github.io"
languageCode = "en-us"
title = "Ahmad Rushdi"
theme = "hugo-coder"
languagecode = "en"
defaultcontentlanguage = "en"

paginate = 20
canonifyurls = true

pygmentsstyle = "bw"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true

disqusShortname = "yourdiscussshortname"

[params]
    author = "Ahmad A. Rushdi"
    info = "Research Scientist | Sandia National Laboratories"
    description = "Ahmad Rushdi's personal website"
    keywords = "blog,developer,personal"
    avatarurl = "images/avatar.jpg"

    favicon_32 = "/img/favicon-32x32.png"
    favicon_16 = "/img/favicon-16x16.png"

    footercontent = "Selflessness and freedom go hand in hand. Only a humble person can be free. -unknown"

    hidecredits = false
    hidecopyright = false

    rtl = false

    math = true
    custom_css = ["css/custom.css"]

