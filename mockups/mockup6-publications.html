<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Ahmad A. Rushdi — Publications</title>

<!-- GoatCounter analytics -->
<script data-goatcounter="https://aarushdi.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- BibTeX data + parser. We reuse the parser to get entries, then render with our own HTML. -->
<script src="../js/bibtex-data.js"></script>
<script src="../js/bibtex-parser.js"></script>

<style>
  :root {
    --ink: #2b2b2b; --muted: #888; --rule: #e4e0d8;
    --accent: #b85c00; --bg: #fbf7f0;
    --bg-translucent: rgba(251, 247, 240, 0.88);
    --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-sans); font-size: 15.5px; line-height: 1.65; }

  .topbar { position: sticky; top: 0; background: var(--bg-translucent); backdrop-filter: saturate(140%) blur(10px); -webkit-backdrop-filter: saturate(140%) blur(10px); border-bottom: 1px solid var(--rule); z-index: 50; }
  .topbar .inner { max-width: 880px; margin: 0 auto; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .topbar .name { font-size: 0.98rem; font-weight: 600; color: var(--ink); text-decoration: none; letter-spacing: -0.2px; }
  .topbar nav { font-size: 0.94rem; }
  .topbar nav a { color: var(--ink); text-decoration: none; margin-left: 1.4rem; }
  .topbar nav a:hover { color: var(--accent); }
  .topbar nav a.current { color: var(--accent); font-weight: 600; }

  .wrap { max-width: 880px; margin: 0 auto; padding: 3.5rem 1.5rem 6rem; }

  .page-header { margin-bottom: 2.5rem; }
  h1 { font-size: 2rem; font-weight: 600; letter-spacing: -0.4px; margin: 0 0 0.5rem; line-height: 1.15; }
  .page-intro { color: var(--muted); font-size: 0.98rem; margin: 0; max-width: 60ch; }
  .page-intro a { color: var(--muted); text-decoration: underline; text-decoration-color: var(--rule); }
  .page-intro a:hover { color: var(--accent); text-decoration-color: var(--accent); }

  h2 { font-family: var(--font-mono); font-size: 1rem; font-weight: 600; color: var(--accent); margin: 2.5rem 0 1rem; letter-spacing: -0.2px; scroll-margin-top: 5rem; }
  h2::before { content: '## '; color: var(--muted); font-weight: 400; }

  /* Year jump-chips */
  .year-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 1.5rem 0 1rem; font-family: var(--font-mono); font-size: 0.82rem; }
  .year-chips a { padding: 0.3rem 0.7rem; border: 1px solid var(--rule); border-radius: 999px; color: var(--ink); text-decoration: none; background: white; transition: border-color 0.15s, color 0.15s; white-space: nowrap; }
  .year-chips a:hover { border-color: var(--accent); color: var(--accent); }

  p { margin: 0 0 1rem; line-height: 1.65; }
  a { color: var(--accent); text-decoration: underline; text-decoration-color: rgba(184,92,0,0.3); text-underline-offset: 2px; }
  a:hover { text-decoration-color: var(--accent); }

  /* Publication entries */
  .pub-list { list-style: none; padding: 0; margin: 0; }
  .pub-list li { padding: 0.8rem 0; border-bottom: 1px dashed var(--rule); }
  .pub-list li:last-child { border-bottom: none; }
  .pub-title { font-weight: 500; margin: 0 0 0.25rem; line-height: 1.45; color: var(--ink); }
  .pub-authors { color: var(--muted); font-size: 0.92rem; margin: 0 0 0.25rem; line-height: 1.5; }
  .me { color: var(--ink); font-weight: 600; }
  .pub-venue { color: var(--muted); font-size: 0.9rem; margin: 0; font-style: italic; }
  .pub-links { font-family: var(--font-mono); font-size: 0.82rem; margin-left: 0.5rem; font-style: normal; }
  .pub-links a { color: var(--ink); text-decoration: none; margin-right: 0.25rem; }
  .pub-links a::before { content: '['; color: var(--muted); }
  .pub-links a::after  { content: ']'; color: var(--muted); }
  .pub-links a:hover { color: var(--accent); }

  .hidden { display: none !important; }
  .seemore { margin-top: 1.5rem; font-family: var(--font-mono); font-size: 0.88rem; background: none; border: none; color: var(--accent); cursor: pointer; padding: 0; }
  .seemore::before { content: '$ '; color: var(--muted); }
  .seemore:hover { text-decoration: underline; }

  footer { margin-top: 4rem; color: var(--muted); font-size: 0.82rem; font-family: var(--font-mono); }

  @media (max-width: 700px) {
    .topbar .inner { padding: 0.7rem 1rem; }
    .topbar nav a { margin-left: 0.9rem; font-size: 0.88rem; }
    h1 { font-size: 1.6rem; }
    .year-chips a { padding: 0.5rem 0.9rem; }   /* larger tap targets on phones */
    .pub-title { font-size: 0.98rem; }
    .pub-authors, .pub-venue { font-size: 0.88rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="inner">
    <a class="name" href="mockup6-mono-topbar.html">Ahmad A. Rushdi</a>
    <nav>
      <a href="mockup6-mono-topbar.html">Home</a>
      <a href="mockup6-publications.html" class="current">Publications</a>
      <a href="mockup6-talks.html">Talks</a>
      <a href="mockup6-projects.html">Projects</a>
    </nav>
  </div>
</div>

<div class="wrap">
  <div class="page-header">
    <h1>Publications</h1>
    <p class="page-intro">Peer-reviewed work. See also my <a href="https://scholar.google.com/citations?user=9F-0uvIAAAAJ&hl=en">Google Scholar</a>.</p>
    <div class="year-chips" id="year-chips"></div>
  </div>

  <div id="pubs-content"></div>

  <button class="seemore" id="seemore">show all publications</button>

  <footer>// © 2026 Ahmad A. Rushdi · last_updated 2026-05</footer>
</div>

<script>
  (function () {
    // Parse all entries from the embedded BibTeX
    const parser = new BibTeXParser();
    parser.parse(BIBTEX_DATA);

    // Fall back to year embedded in the entry key (e.g., "anthis2025iclr" → "2025")
    // when the BibTeX field is missing.
    function yearOf(e) {
      if (e.year && /^\d{4}$/.test(String(e.year).trim())) return String(e.year).trim();
      const m = (e.key || '').match(/(19|20)\d{2}/);
      return m ? m[0] : 'undated';
    }

    const entries = parser.entries.slice().sort(
      (a, b) => (parseInt(yearOf(b)) || 0) - (parseInt(yearOf(a)) || 0)
    );

    const byYear = {};
    entries.forEach(e => {
      const y = yearOf(e);
      if (!byYear[y]) byYear[y] = [];
      byYear[y].push(e);
    });
    const years = Object.keys(byYear).sort((a, b) => (parseInt(b) || 0) - (parseInt(a) || 0));

    // Render year chips
    document.getElementById('year-chips').innerHTML =
      years.map(y => `<a href="#year-${y}" data-year="${y}">${y}</a>`).join('');

    // Recent two years visible by default; the rest collapsed
    const recentYears = years.slice(0, 2);

    function escapeHTML(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Only Ahmad A. Rushdi gets bolded — not other Rushdi co-authors (e.g., Mostafa).
    // Handles "Ahmad A. Rushdi", "Ahmad A Rushdi", "Ahmad Rushdi", "Rushdi, Ahmad A.",
    // and the Khan-paper diacritic variant.
    function isMe(a) {
      return (/^Ahmad\b/i.test(a) && /Rushdi/i.test(a)) || /^Rushdi,\s*Ahmad/i.test(a);
    }

    // Always render the user's name in canonical form, regardless of source variants
    // ("Ahmad A. Rushdi", "Ahmad Rushdi", "Rushdi, Ahmad A.", "Ahmad A. ٌRushdi", etc.).
    const ME_CANONICAL = 'Ahmad A. Rushdi';

    // BibTeX usually uses " and " between authors, but some entries (e.g., anthis2025iclr)
    // use commas instead. Detect which convention is in use and split accordingly.
    function splitAuthors(authors) {
      if (/\s+and\s+/i.test(authors)) {
        return authors.split(/\s+and\s+/);
      }
      return authors.split(/,\s*/);
    }

    function formatAuthors(authors) {
      if (!authors) return '';
      return splitAuthors(authors)
        .map(a => a.replace(/^,\s*/, '').trim())
        .filter(Boolean)
        .map(a => isMe(a) ? `<span class="me">${ME_CANONICAL}</span>` : escapeHTML(a))
        .join(', ');
    }

    function renderVenue(e) {
      if (e.journal) {
        let v = `<em>${escapeHTML(e.journal)}</em>`;
        if (e.volume && e.number && e.pages) v += ` ${e.volume}(${e.number}):${e.pages}`;
        else if (e.volume && e.pages) v += `, ${e.volume}:${e.pages}`;
        else if (e.volume) v += `, ${e.volume}`;
        else if (e.pages) v += `, ${e.pages}`;
        return v;
      }
      if (e.booktitle) {
        let v = `<em>${escapeHTML(e.booktitle)}</em>`;
        if (e.pages) v += `, ${e.pages}`;
        if (e.publisher) v += ` · ${escapeHTML(e.publisher)}`;
        return v;
      }
      if (e.institution) {
        let v = `Technical report · ${escapeHTML(e.institution)}`;
        if (e.address) v += `, ${escapeHTML(e.address)}`;
        return v;
      }
      return '';
    }

    function renderEntry(e) {
      const title = escapeHTML(e.title || '');
      const authors = formatAuthors(e.author);
      const venue = renderVenue(e);
      const links = e.url ? `<span class="pub-links"><a href="${e.url}">link</a></span>` : '';
      return `<li>
        <p class="pub-title">${title}</p>
        <p class="pub-authors">${authors}</p>
        <p class="pub-venue">${venue}${links}</p>
      </li>`;
    }

    // Render year sections
    document.getElementById('pubs-content').innerHTML = years.map(y => {
      const isHidden = !recentYears.includes(y);
      const cls = isHidden ? 'more hidden' : '';
      return `<section id="year-${y}" class="${cls}">
        <h2>${y}</h2>
        <ul class="pub-list">${byYear[y].map(renderEntry).join('')}</ul>
      </section>`;
    }).join('');

    // Seemore toggle
    const btn = document.getElementById('seemore');
    btn.addEventListener('click', () => {
      document.querySelectorAll('section.more').forEach(s => s.classList.toggle('hidden'));
      btn.textContent = btn.textContent.includes('less') ? 'show all publications' : 'show less';
    });

    // Chip click auto-expands if the target year is hidden
    document.querySelectorAll('#year-chips a').forEach(a => {
      a.addEventListener('click', () => {
        const y = a.dataset.year;
        const sec = document.getElementById('year-' + y);
        if (sec && sec.classList.contains('hidden')) {
          // Expand everything so the anchor works
          document.querySelectorAll('section.more').forEach(s => s.classList.remove('hidden'));
          btn.textContent = 'show less';
        }
      });
    });
  })();
</script>
</body>
</html>
